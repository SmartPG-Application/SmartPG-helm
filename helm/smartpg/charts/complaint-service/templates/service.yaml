apiVersion: v1
kind: Service
metadata:
  name: {{ include "complaint-service.fullname" . }}
  labels:
    {{- include "complaint-service.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "complaint-service.selectorLabels" . | nindent 4 }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
