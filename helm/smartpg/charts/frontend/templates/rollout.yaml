apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "frontend.fullname" . }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      {{- include "frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "frontend.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsUser: 0
        runAsNonRoot: false
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.service.port }}
          envFrom:
            - configMapRef:
                name: smartpg-config
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
  strategy:
    blueGreen:
      activeService: {{ include "frontend.fullname" . }}-active
      previewService: {{ include "frontend.fullname" . }}-preview
      autoPromotionEnabled: {{ .Values.blueGreen.autoPromotionEnabled | default false }}
      autoPromotionSeconds: {{ .Values.blueGreen.autoPromotionSeconds | default 30 }}
      scaleDownDelaySeconds: {{ .Values.blueGreen.scaleDownDelaySeconds | default 30 }}
      previewReplicaCount: {{ .Values.blueGreen.previewReplicaCount | default 1 }}
      abortScaleDownDelaySeconds: 30
