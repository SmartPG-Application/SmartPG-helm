image:
  repository: vignesh8386/smartpg-frontend
  tag: v1.0.0

replicaCount: 1

service:
  port: 80

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "250m"

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  cpuUtilization: 50

blueGreen:
  autoPromotionEnabled: false
  autoPromotionSeconds: 30
  scaleDownDelaySeconds: 30
  previewReplicaCount: 1
