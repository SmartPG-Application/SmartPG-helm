apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mess-service.fullname" . }}
  labels:
    {{- include "mess-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount | default 2 }}
  selector:
    matchLabels:
      {{- include "mess-service.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "mess-service.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: mess-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.service.port }}
          envFrom:
            - configMapRef:
                name: smartpg-config
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: smartpg-secrets
                  key: MONGO_URI
                  optional: true
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: smartpg-secrets
                  key: JWT_SECRET
                  optional: true
            - name: PORT
              value: {{ .Values.service.port | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
