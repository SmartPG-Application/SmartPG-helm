apiVersion: v1
kind: Service
metadata:
  name: mongodb-client
  labels:
    {{- include "mongodb.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "mongodb.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      name: mongodb
