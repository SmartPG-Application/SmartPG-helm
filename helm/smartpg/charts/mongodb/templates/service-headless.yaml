apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  labels:
    {{- include "mongodb.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "mongodb.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      name: mongodb
