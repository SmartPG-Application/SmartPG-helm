{{- if and .Values.persistence.storageClass (eq .Values.persistence.storageClass "csi-standard") }}
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: csi-standard
  labels:
    {{- include "mongodb.labels" . | nindent 4 }}
provisioner: nfs.csi.k8s.io
parameters:
  server: 172.31.41.217
  share: /var/nfs/general
reclaimPolicy: Delete
volumeBindingMode: Immediate
{{- end }}
