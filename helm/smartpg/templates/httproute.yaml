apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: smartpg-routes
spec:
  parentRefs:
    - name: smartpg-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
        - path:
            type: PathPrefix
            value: /api/tenants
        - path:
            type: PathPrefix
            value: /api/rooms
      backendRefs:
        - name: tenant-service
          port: 4001
    - matches:
        - path:
            type: PathPrefix
            value: /api/payments
      backendRefs:
        - name: payment-service
          port: 4002
    - matches:
        - path:
            type: PathPrefix
            value: /api/menu
        - path:
            type: PathPrefix
            value: /api/orders
        - path:
            type: PathPrefix
            value: /api/mess
      backendRefs:
        - name: mess-service
          port: 4003
    - matches:
        - path:
            type: PathPrefix
            value: /api/complaints
      backendRefs:
        - name: complaint-service
          port: 4004
    - matches:
        - path:
            type: PathPrefix
            value: /api/notifications
      backendRefs:
        - name: notification-service
          port: 4005
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80
